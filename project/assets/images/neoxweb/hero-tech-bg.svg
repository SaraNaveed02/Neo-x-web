<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080">
      <stop stop-color="#000000"/>
      <stop offset="0.55" stop-color="#030806"/>
      <stop offset="1" stop-color="#051a0a"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="78%" cy="42%" r="42%">
      <stop stop-color="#22c55e" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0f172a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#000" stop-opacity="0.92"/>
      <stop offset="0.7" stop-opacity="0.4"/>
      <stop offset="1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#globeGlow)"/>
  <rect width="1200" height="1080" fill="url(#leftFade)"/>

  <!-- wireframe globe -->
  <g transform="translate(1180 320)" opacity="1">
    <ellipse cx="0" cy="0" rx="280" ry="280" fill="none" stroke="#22c55e" stroke-width="1.4" opacity="0.42"/>
    <ellipse cx="0" cy="0" rx="280" ry="90" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="280" ry="160" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.32"/>
    <ellipse cx="0" cy="0" rx="280" ry="220" fill="none" stroke="#4ade80" stroke-width="0.9" opacity="0.24"/>
    <ellipse cx="0" cy="0" rx="90" ry="280" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.38"/>
    <ellipse cx="0" cy="0" rx="160" ry="280" fill="none" stroke="#4ade80" stroke-width="0.9" opacity="0.28"/>
    <ellipse cx="0" cy="0" rx="220" ry="280" fill="none" stroke="#4ade80" stroke-width="0.9" opacity="0.2"/>
    <path d="M-280 0 A280 280 0 0 1 280 0" fill="none" stroke="#22c55e" stroke-width="1.8" opacity="0.55"/>
    <path d="M-280 0 A280 280 0 0 0 280 0" fill="none" stroke="#22c55e" stroke-width="1.2" opacity="0.3"/>
    <!-- glow dots on globe -->
    <circle cx="-120" cy="-80" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="60" cy="-140" r="3" fill="#22c55e" opacity="0.85"/>
    <circle cx="150" cy="40" r="5" fill="#4ade80" opacity="0.75"/>
    <circle cx="-40" cy="120" r="3" fill="#4ade80" opacity="0.65"/>
    <circle cx="100" cy="-60" r="2" fill="#86efac"/>
    <circle cx="-180" cy="30" r="2" fill="#86efac"/>
  </g>

  <!-- floating dashboard panel 1 -->
  <g transform="translate(1380 180)" opacity="0.88">
    <rect width="220" height="140" rx="12" fill="url(#panelGrad)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
    <rect x="16" y="16" width="80" height="8" rx="4" fill="#334155"/>
    <rect x="16" y="36" width="188" height="6" rx="3" fill="#1e293b"/>
    <rect x="16" y="56" width="60" height="70" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="0.8"/>
    <rect x="86" y="56" width="118" height="30" rx="4" fill="rgba(34,197,94,0.08)"/>
    <polyline points="86,72 110,62 130,68 150,52 204,58" fill="none" stroke="#4ade80" stroke-width="2"/>
    <rect x="86" y="96" width="118" height="30" rx="4" fill="rgba(34,197,94,0.06)"/>
    <rect x="96" y="106" width="12" height="18" rx="2" fill="#22c55e" opacity="0.7"/>
    <rect x="114" y="98" width="12" height="26" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect x="132" y="102" width="12" height="22" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="150" y="94" width="12" height="30" rx="2" fill="#4ade80"/>
  </g>

  <!-- ambient particles -->
  <g fill="#4ade80" opacity="0.4">
    <circle cx="200" cy="180" r="2"/><circle cx="380" cy="120" r="1.5"/><circle cx="520" cy="280" r="2"/>
    <circle cx="1600" cy="200" r="2"/><circle cx="1750" cy="500" r="1.5"/><circle cx="1480" cy="680" r="2"/>
  </g>

  <!-- bottom gradient -->
  <rect y="800" width="1920" height="280" fill="#000" opacity="0.5"/>
</svg>
